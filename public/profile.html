<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Manage your personal details on Shopverse Store">
  <title>Personal Details — Shopverse Store</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <div id="navbar"></div>

  <div class="page-wrapper">
    <div class="container" style="max-width: 600px; margin: 0 auto;">
      <div class="section-header fade-in">
        <h1>Personal Details</h1>
        <p>Update your profile information</p>
      </div>
      
      <div class="glass-card fade-in" style="padding: var(--space-xl); transform: none;">
        <form id="profileForm">
          <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" required>
          </div>
          
          <hr style="border: 0; height: 1px; background: var(--border-glass); margin: var(--space-xl) 0;">
          
          <h3 style="margin-bottom: var(--space-md); font-size: 1.2rem;">Change Password</h3>
          <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: var(--space-md);">Leave blank if you don't want to change it</p>
          
          <div class="form-group">
            <label class="form-label" for="password">New Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="At least 6 characters">
          </div>
          
          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm New Password</label>
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm your new password">
          </div>
          
          <button type="submit" class="btn btn-primary btn-lg btn-block" id="updateBtn">
            Save Changes
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
