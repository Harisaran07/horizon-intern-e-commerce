<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View product details, reviews, and add to your cart — Shopverse Store">
  <title>Product Details — Shopverse Store</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Product Detail -->
  <div class="page-wrapper">
    <div class="container" id="productDetail">
      <!-- Loading skeleton -->
      <div class="product-detail fade-in">
        <div class="skeleton" style="height: 500px; border-radius: var(--radius-lg);"></div>
        <div style="padding: var(--space-lg) 0;">
          <div class="skeleton" style="width: 80px; height: 24px; margin-bottom: var(--space-md);"></div>
          <div class="skeleton" style="width: 70%; height: 36px; margin-bottom: var(--space-md);"></div>
          <div class="skeleton" style="width: 40%; height: 24px; margin-bottom: var(--space-lg);"></div>
          <div class="skeleton" style="width: 120px; height: 40px; margin-bottom: var(--space-xl);"></div>
          <div class="skeleton" style="width: 100%; height: 80px; margin-bottom: var(--space-md);"></div>
          <div class="skeleton" style="width: 100%; height: 80px; margin-bottom: var(--space-xl);"></div>
          <div class="skeleton" style="width: 100%; height: 52px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/products.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadProductDetail();
    });
  </script>
</body>
</html>
