<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Shopverse Store account to manage orders and checkout.">
  <title>Login — Shopverse Store</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card fade-in">
      <div style="text-align: center; margin-bottom: var(--space-lg);">
        <a href="index.html" class="navbar-brand" style="display: inline-flex; font-size: 1.3rem; margin-bottom: var(--space-lg);">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:28px;height:28px;">
            <rect width="32" height="32" rx="8" fill="url(#brand-gradient-login)"/>
            <path d="M8 16h16M12 10l-4 6 4 6M20 10l4 6-4 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="brand-gradient-login" x1="0" y1="0" x2="32" y2="32">
                <stop stop-color="#8b5cf6"/>
                <stop offset="1" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
          </svg>
          Shopverse
        </a>
      </div>

      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your account to continue</p>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
